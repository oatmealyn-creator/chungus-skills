  <g transform="translate(80, 440)">
    <rect x="0" y="0" width="230" height="90" rx="8" fill="#1a1a2e" stroke="#ff6b35" stroke-width="1.5"/>
    <text x="20" y="30" font-family="'Courier New',monospace" font-size="14" fill="#ff6b35" font-weight="bold">> ZERO COMMANDS</text>
    <text x="20" y="54" font-family="'Courier New',monospace" font-size="13" fill="#777">Auto-triggers from SKILL.md</text>
