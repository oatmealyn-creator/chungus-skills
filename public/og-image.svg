      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#e04e1a"/>
