    <rect x="260" y="0" width="230" height="90" rx="8" fill="#1a1a2e" stroke="#ff6b35" stroke-width="1.5"/>
    <text x="280" y="30" font-family="'Courier New',monospace" font-size="14" fill="#ff6b35" font-weight="bold">> 72 AGENTS</text>
    <text x="280" y="54" font-family="'Courier New',monospace" font-size="13" fill="#777">Claude Code, Cursor, Copilot,</text>
    <text x="280" y="74" font-family="'Courier New',monospace" font-size="13" fill="#777">Windsurf, Gemini, OpenCode + more</text>

