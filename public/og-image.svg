    <path d="M30 0h60v40c0 22-12 40-30 40S30 62 30 40V0z" fill="#161616" stroke="#ff6b35" stroke-width="2"/>
    <rect x="38" y="18" width="14" height="14" rx="3" fill="#ff6b35"/>
    <rect x="68" y="18" width="14" height="14" rx="3" fill="#ff6b35"/>
    <rect x="40" y="46" width="40" height="6" rx="2" fill="#ff6b35"/>
