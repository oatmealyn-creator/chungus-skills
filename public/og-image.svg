    <text x="540" y="30" font-family="'Courier New',monospace" font-size="14" fill="#ff6b35" font-weight="bold">> 40+ ANTI-SLOP</text>
    <text x="540" y="54" font-family="'Courier New',monospace" font-size="13" fill="#777">No Inter font, no purple gradients</text>
    <text x="540" y="74" font-family="'Courier New',monospace" font-size="13" fill="#777">no glassmorphism, no cream bg</text>

    <rect x="780" y="0" width="230" height="90" rx="8" fill="#1a1a2e" stroke="#ff6b35" stroke-width="1.5"/>
    <text x="800" y="30" font-family="'Courier New',monospace" font-size="14" fill="#ff6b35" font-weight="bold">> SHIP SAFE</text>
    <text x="800" y="54" font-family="'Courier New',monospace" font-size="13" fill="#777">8-step prelaunch audit</text>
    <text x="800" y="74" font-family="'Courier New',monospace" font-size="13" fill="#777">Container self-healing</text>
